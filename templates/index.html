<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gura Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="app-container">

        <!-- Main Workspace Chat Engine Container -->
        <div class="chat-area">
            
            <!-- Classy Top Header Navbar -->
            <div class="header">
                <div class="brand">
                    <h1>🤖 Gura Assistant</h1>
                    <span class="divider">|</span>
                    <p>Your Personal FD Tracker</p>
                </div>
                <a href="/logout" class="logout-btn">Logout</a>
            </div>
            
            <!-- Message Feed Log Window -->
            <div id="chat-box" class="chat-box">
                <div class="bot">
                    Hello 👋<br><br>
                    I'm Gura Assistant.<br>
                    Ask me about your FDs, memories, or anything else.
                </div>
            </div>

            <!-- User Text Entry Fields -->
            <div class="input-area">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Message Gura..." 
                    autocomplete="off"
                >
                <button id="send-btn">➤</button>
            </div>

        </div>

    </div>

    <!-- Core Runtime Module Scripts -->
    <script src="/static/script.js"></script>
</body>
</html>
